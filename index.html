<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>동사 자판기 🌿</title>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --mint: #6BBFBC;
    --mint-light: #A8E0DE;
    --mint-pale: #E2F7F6;
    --mint-dark: #3E9B99;
    --mint-darker: #2A7A78;
    --cream: #FFF8EE;
    --warm: #FFF0DC;
    --coral: #FF8C6B;
    --coral-light: #FFBCAA;
    --peach: #FFD4B8;
    --yellow: #FFD97D;
    --brown: #8B5E52;
    --text-dark: #2C3A3A;
    --text-mid: #5A7070;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    min-height:100vh;
    background: #E8F5F4;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(255,210,180,0.35) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(107,191,188,0.25) 0%, transparent 50%),
      radial-gradient(circle at 60% 10%, rgba(255,217,125,0.2) 0%, transparent 40%);
    font-family:'Noto Sans KR', sans-serif;
    display:flex; flex-direction:column; align-items:center;
    padding:28px 16px 70px;
    overflow-x:hidden;
  }

  /* 제목 */
  .title-area {
    text-align:center;
    margin-bottom:22px;
  }
  .title-area h1 {
    font-family:'Gaegu', cursive;
    font-size:2.3rem;
    color: var(--mint-darker);
    text-shadow: 2px 3px 0 rgba(255,200,160,0.5);
    letter-spacing:2px;
  }
  .title-area .subtitle {
    font-size:0.82rem;
    color:var(--text-mid);
    margin-top:5px;
  }

  /* 자판기 본체 */
  .vending-machine {
    width:100%; max-width:460px;
    background: linear-gradient(170deg, #72C4C2 0%, #5AADAB 35%, #4A9E9C 70%, #3D8E8C 100%);
    border-radius:32px 32px 22px 22px;
    padding:22px 18px 24px;
    box-shadow:
      0 24px 64px rgba(62,155,153,0.45),
      0 8px 24px rgba(0,0,0,0.12),
      inset 0 2px 8px rgba(255,255,255,0.28),
      inset 0 -6px 16px rgba(0,0,0,0.12);
    position:relative;
  }

  /* 상단 로고 바 */
  .machine-top {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:16px;
    padding:0 2px;
  }
  .machine-logo {
    font-family:'Gaegu', cursive;
    font-size:1.25rem;
    color:white;
    text-shadow:1px 2px 6px rgba(0,0,0,0.2);
    letter-spacing:1px;
  }
  .char-left  { font-size:1.7rem; display:inline-block; animation:wobble 3s ease-in-out infinite; }
  .char-right { font-size:1.7rem; display:inline-block; animation:wobble 3s ease-in-out infinite reverse; }
  @keyframes wobble { 0%,100%{transform:rotate(-6deg)} 50%{transform:rotate(6deg)} }

  /* 검색 디스플레이 패널 */
  .search-panel {
    background:#1C3A3A;
    border-radius:14px;
    padding:14px 14px 12px;
    margin-bottom:14px;
    border:2px solid #0E2525;
    box-shadow:inset 0 4px 14px rgba(0,0,0,0.45), 0 2px 6px rgba(0,0,0,0.2);
    position:relative;
    overflow:hidden;
  }
  .search-panel::before {
    content:'';
    position:absolute; top:0; left:0; right:0; height:35%;
    background:linear-gradient(rgba(255,255,255,0.04), transparent);
    border-radius:12px 12px 0 0;
    pointer-events:none;
  }
  .search-label {
    font-size:0.6rem;
    color:#6AECEC;
    letter-spacing:2px;
    font-weight:700;
    text-transform:uppercase;
    margin-bottom:8px;
    font-family:'DM Mono', monospace;
  }
  .search-row {
    display:flex;
    gap:8px;
    align-items:center;
  }
  .search-input {
    flex:1;
    background:rgba(255,255,255,0.08);
    border:1.5px solid rgba(106,236,236,0.3);
    border-radius:8px;
    padding:9px 12px;
    color:#A8FFEE;
    font-family:'DM Mono', monospace;
    font-size:1rem;
    outline:none;
    transition:border-color 0.2s;
    caret-color:#A8FFEE;
  }
  .search-input::placeholder { color:#2A6060; font-size:0.85rem; }
  .search-input:focus { border-color:rgba(106,236,236,0.7); background:rgba(255,255,255,0.11); }

  .search-btn {
    background:linear-gradient(135deg, var(--coral), #FF6B4A);
    border:none;
    border-radius:8px;
    padding:9px 14px;
    color:white;
    font-weight:900;
    font-size:0.82rem;
    cursor:pointer;
    box-shadow:0 3px 0 #C04A30, 0 4px 8px rgba(0,0,0,0.2);
    transition:all 0.1s;
    letter-spacing:0.5px;
    white-space:nowrap;
  }
  .search-btn:hover { background:linear-gradient(135deg, #FF9A7A, #FF7050); }
  .search-btn:active { transform:translateY(2px); box-shadow:0 1px 0 #C04A30; }

  /* 목록 보기 버튼 */
  .list-toggle-wrap {
    margin-bottom:12px;
    text-align:center;
  }
  .list-toggle-btn {
    background:linear-gradient(135deg, #FFF8EE, #FFE8CC);
    border:2px solid rgba(255,180,120,0.5);
    border-radius:10px;
    padding:8px 20px;
    font-size:0.78rem;
    font-weight:700;
    color:var(--brown);
    cursor:pointer;
    box-shadow:0 3px 0 rgba(180,100,60,0.3), 0 4px 10px rgba(0,0,0,0.1);
    transition:all 0.1s;
    letter-spacing:0.5px;
    display:inline-flex;
    align-items:center;
    gap:6px;
  }
  .list-toggle-btn:hover { background:linear-gradient(135deg, #FFFFFF, #FFF0D8); }
  .list-toggle-btn:active { transform:translateY(2px); box-shadow:0 1px 0 rgba(180,100,60,0.3); }
  .toggle-arrow { transition:transform 0.25s; display:inline-block; }
  .toggle-arrow.open { transform:rotate(180deg); }

  /* 동사 목록 드롭다운 */
  .verb-list-panel {
    background:#1C3A3A;
    border-radius:12px;
    padding:12px;
    margin-bottom:12px;
    display:none;
    animation:fadeDown 0.25s ease;
    max-height:220px;
    overflow-y:auto;
  }
  .verb-list-panel.show { display:block; }
  @keyframes fadeDown { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }

  .verb-list-panel::-webkit-scrollbar { width:4px; }
  .verb-list-panel::-webkit-scrollbar-track { background:rgba(255,255,255,0.05); border-radius:4px; }
  .verb-list-panel::-webkit-scrollbar-thumb { background:var(--mint-light); border-radius:4px; }

  .verb-grid {
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:6px;
  }
  .verb-chip {
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(106,236,236,0.2);
    border-radius:6px;
    padding:5px 4px;
    text-align:center;
    cursor:pointer;
    font-family:'DM Mono', monospace;
    font-size:0.7rem;
    color:#A8FFEE;
    transition:all 0.12s;
    font-weight:500;
  }
  .verb-chip:hover {
    background:rgba(168,255,238,0.15);
    border-color:rgba(106,236,236,0.5);
    color:#DFFFFF;
    transform:translateY(-1px);
  }

  /* 결과 트레이 */
  .result-tray {
    background:linear-gradient(145deg, var(--cream), var(--warm));
    border-radius:16px;
    border:2px dashed rgba(255,160,100,0.4);
    padding:16px 14px;
    min-height:160px;
    box-shadow:0 4px 14px rgba(0,0,0,0.07);
    position:relative;
    overflow:hidden;
  }
  .tray-label {
    font-size:0.6rem;
    color:var(--coral);
    letter-spacing:2px;
    text-transform:uppercase;
    font-weight:700;
    margin-bottom:12px;
    font-family:'DM Mono', monospace;
  }

  /* 결과 없을 때 */
  .result-empty {
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding:20px 0; gap:8px;
    text-align:center;
  }
  .result-empty .empty-icon { font-size:2.2rem; }
  .result-empty p { font-size:0.8rem; color:#C8B090; line-height:1.6; }

  /* 결과 카드 */
  .result-card { display:none; animation:slideUp 0.3s ease; }
  .result-card.show { display:block; }
  @keyframes slideUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

  .verb-title-row {
    display:flex;
    align-items:baseline;
    gap:10px;
    margin-bottom:14px;
    padding-bottom:10px;
    border-bottom:2px solid rgba(255,160,100,0.2);
  }
  .verb-main {
    font-family:'DM Mono', monospace;
    font-size:1.7rem;
    font-weight:500;
    color:var(--mint-darker);
  }
  .verb-meaning-main {
    font-size:0.78rem;
    color:var(--text-mid);
    font-weight:500;
  }

  /* 형식 카드들 */
  .pattern-list { display:flex; flex-direction:column; gap:10px; }

  .pattern-card {
    background:white;
    border-radius:10px;
    padding:10px 12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.05);
    border-left:4px solid var(--mint-light);
    position:relative;
  }
  .pattern-card:nth-child(2n) { border-left-color:var(--coral-light); }
  .pattern-card:nth-child(3n) { border-left-color:var(--yellow); }

  .pattern-top {
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:6px;
    flex-wrap:wrap;
  }
  .form-badge {
    background:var(--mint-pale);
    color:var(--mint-darker);
    font-size:0.6rem;
    font-weight:900;
    padding:2px 8px;
    border-radius:20px;
    letter-spacing:0.5px;
    white-space:nowrap;
  }
  .pattern-card:nth-child(2n) .form-badge {
    background:#FFF0E8;
    color:#C05030;
  }
  .pattern-card:nth-child(3n) .form-badge {
    background:#FFF8DC;
    color:#8A6000;
  }
  .pattern-structure {
    font-family:'DM Mono', monospace;
    font-size:0.72rem;
    color:var(--text-mid);
    font-weight:500;
  }
  .pattern-meaning {
    font-size:0.82rem;
    font-weight:700;
    color:var(--text-dark);
    margin-bottom:5px;
  }
  .pattern-example {
    font-size:0.78rem;
    color:var(--text-mid);
    line-height:1.55;
    font-style:italic;
  }
  .pattern-example-ko {
    font-size:0.72rem;
    color:#9AACAC;
    margin-top:2px;
    font-style:normal;
  }

  /* 하단 */
  .machine-bottom {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding-top:8px;
  }
  .brand-slot {
    background:#1A3A3A;
    border-radius:6px;
    padding:5px 12px;
    font-size:0.72rem;
    color:#1E90FF;
    letter-spacing:2px;
    font-weight:900;
    font-family:'DM Mono', monospace;
    text-shadow:0 0 8px rgba(30,144,255,0.6);
  }
  .deco-lights { display:flex; gap:6px; }
  .deco-light {
    width:10px; height:10px;
    border-radius:50%;
    animation:blink 2s ease-in-out infinite;
  }
  .deco-light:nth-child(1){background:var(--coral);animation-delay:0s}
  .deco-light:nth-child(2){background:var(--yellow);animation-delay:0.5s}
  .deco-light:nth-child(3){background:#7DFFF0;animation-delay:1s}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.25}}

  .deco-top { position:absolute; top:-8px; right:18px; font-size:1.5rem; animation:bounce 2.8s ease-in-out infinite; }
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

  /* 검색 없음 메시지 */
  .no-result {
    text-align:center;
    padding:20px 0;
    font-size:0.85rem;
    color:#C8B090;
  }
  .no-result strong { color:var(--coral); font-family:'DM Mono', monospace; }
</style>
</head>
<body>

<div class="title-area">
  <h1>🌿 동사 자판기</h1>
  <p class="subtitle">동사를 검색하면 형식별 구조와 예문이 뚝딱!</p>
</div>

<div class="vending-machine">

  <div class="machine-top">
    <span class="char-left">🌸</span>
    <span class="machine-logo">VERB VENDING</span>
    <span class="char-right">🍀</span>
  </div>

  <!-- 검색 패널 -->
  <div class="search-panel">
    <div class="search-label">🔍 동사 검색 / SEARCH VERB</div>
    <div class="search-row">
      <input type="text" class="search-input" id="searchInput"
        placeholder="예: allow, give, make ..."
        oninput="onSearchInput(this.value)"
        onkeydown="if(event.key==='Enter') doSearch()">
      <button class="search-btn" onclick="doSearch()">검색</button>
    </div>
  </div>

  <!-- 목록 보기 버튼 -->
  <div class="list-toggle-wrap">
    <button class="list-toggle-btn" onclick="toggleList()" id="listToggleBtn">
      📋 동사 목록 보기 <span class="toggle-arrow" id="toggleArrow">▼</span>
    </button>
  </div>

  <!-- 동사 목록 드롭다운 -->
  <div class="verb-list-panel" id="verbListPanel">
    <div class="verb-grid" id="verbGrid"></div>
  </div>

  <!-- 결과 트레이 -->
  <div class="result-tray" id="resultTray">
    <div class="tray-label">📦 결과 트레이</div>
    <div class="result-empty" id="resultEmpty">
      <span class="empty-icon">🔤</span>
      <p>동사를 검색하거나<br>목록에서 선택해보세요!</p>
    </div>
    <div class="result-card" id="resultCard"></div>
  </div>

  <div class="machine-bottom">
    <div class="brand-slot">SEJIN ENGLISH</div>
    <div class="deco-lights">
      <div class="deco-light"></div>
      <div class="deco-light"></div>
      <div class="deco-light"></div>
    </div>
  </div>

  <div class="deco-top">✨</div>
</div>

<script>
const verbs = {
  allow: {
    meaning: '허용하다, 가능하게 하다',
    patterns: [
      { form:'1형식 변형', structure:'allow + for + 명사', meaning:'~을 고려하다, 감안하다', example:'We should allow for delays.', ko:'지연을 감안해야 해요.' },
      { form:'4형식', structure:'allow + 목(사람) + 목(사물)', meaning:'~에게 ~을 허락하다', example:'They allowed him extra time.', ko:'그들은 그에게 추가 시간을 줬어요.' },
      { form:'5형식', structure:'allow + 목 + to do', meaning:'~가 …하도록 허용하다', example:'She allowed me to leave early.', ko:'그녀는 내가 일찍 떠나도록 허락했어요.' },
    ]
  },
  give: {
    meaning: '주다, 제공하다',
    patterns: [
      { form:'3형식', structure:'give + 목(사물)', meaning:'~을 주다', example:'She gave a speech.', ko:'그녀는 연설을 했어요.' },
      { form:'4형식', structure:'give + 목(사람) + 목(사물)', meaning:'~에게 ~을 주다', example:'He gave me a gift.', ko:'그가 나에게 선물을 줬어요.' },
      { form:'5형식', structure:'give + 목 + 형용사', meaning:'~을 …한 상태로 만들다', example:'The news gave her hope.', ko:'그 소식이 그녀에게 희망을 줬어요.' },
    ]
  },
  make: {
    meaning: '만들다, ~하게 하다',
    patterns: [
      { form:'3형식', structure:'make + 목(사물)', meaning:'~을 만들다', example:'She made a cake.', ko:'그녀는 케이크를 만들었어요.' },
      { form:'5형식', structure:'make + 목 + 형용사', meaning:'~을 …하게 만들다', example:'The music made her happy.', ko:'음악이 그녀를 행복하게 만들었어요.' },
      { form:'5형식', structure:'make + 목 + 동사원형', meaning:'~가 …하도록 만들다 (강제)', example:'He made me wait an hour.', ko:'그는 나를 한 시간 기다리게 했어요.' },
    ]
  },
  get: {
    meaning: '가다/도달하다, ~이 되다, 얻다, 시키다',
    patterns: [
      { form:'1형식', structure:'get + to + 장소/부사', meaning:'~에 가다, 도달하다', example:'How do I get to the station?', ko:'역에 어떻게 가나요?' },
      { form:'2형식', structure:'get + 형용사(보어)', meaning:'(어떤 상태)가 되다', example:'She got angry suddenly.', ko:'그녀는 갑자기 화가 났어요.' },
      { form:'2형식', structure:'get + -ing', meaning:'~하기 시작하다, 계속 ~하다', example:'Let\'s get going before it rains.', ko:'비 오기 전에 출발하자요.' },
      { form:'2형식', structure:'get + p.p. (done)', meaning:'~된 상태가 되다 (수동/완료)', example:'I got dressed in five minutes.', ko:'나는 5분 만에 옷을 입었어요.' },
      { form:'3형식', structure:'get + 목(사물)', meaning:'~을 얻다, 가져오다', example:'I got a new job.', ko:'나는 새 직장을 얻었어요.' },
      { form:'5형식', structure:'get + 목 + to do', meaning:'~가 …하도록 설득하다', example:'She got him to apologize.', ko:'그녀는 그가 사과하도록 했어요.' },
      { form:'5형식', structure:'get + 목 + p.p.', meaning:'~을 …된 상태로 만들다 (사역)', example:'I got my hair cut.', ko:'나는 머리를 잘랐어요.' },
    ]
  },
  have: {
    meaning: '가지다, 경험하다, 시키다',
    patterns: [
      { form:'3형식', structure:'have + 목(사물/경험)', meaning:'~을 갖다, 경험하다', example:'We had a great time.', ko:'우리는 정말 좋은 시간을 보냈어요.' },
      { form:'5형식', structure:'have + 목 + 동사원형', meaning:'~가 …하도록 시키다', example:'I had him fix the bike.', ko:'나는 그에게 자전거를 고치도록 했어요.' },
      { form:'5형식', structure:'have + 목 + p.p.', meaning:'~이 …되도록 하다', example:'She had her car repaired.', ko:'그녀는 차를 수리하게 했어요.' },
    ]
  },
  let: {
    meaning: '허락하다, ~하게 두다',
    patterns: [
      { form:'5형식', structure:'let + 목 + 동사원형', meaning:'~가 …하도록 내버려 두다', example:'Let me know your answer.', ko:'답을 알려주세요.' },
      { form:'5형식', structure:'let + 목 + in/out', meaning:'~을 들이다/내보내다', example:'She let the dog out.', ko:'그녀는 개를 내보냈어요.' },
    ]
  },
  help: {
    meaning: '돕다',
    patterns: [
      { form:'5형식', structure:'help + 목 + (to) do', meaning:'~가 …하도록 돕다', example:'He helped me (to) move.', ko:'그는 내가 이사하는 걸 도와줬어요.' },
      { form:'3형식', structure:'help + with + 명사', meaning:'~에 도움을 주다', example:'She helps with the cooking.', ko:'그녀는 요리를 도와요.' },
      { form:'3형식', structure:'help + 목(사람)', meaning:'~을 돕다', example:'Can you help me?', ko:'나를 도와줄 수 있나요?' },
    ]
  },
  keep: {
    meaning: '유지하다, 계속하다, 막다',
    patterns: [
      { form:'3형식', structure:'keep + 목(사물)', meaning:'~을 유지하다, 보관하다', example:'Keep the receipt.', ko:'영수증을 보관하세요.' },
      { form:'5형식', structure:'keep + 목 + 형용사', meaning:'~을 …한 상태로 유지하다', example:'Keep the door open.', ko:'문을 열어 두세요.' },
      { form:'5형식', structure:'keep + 목 + from + -ing', meaning:'~가 …하지 못하게 막다', example:'He kept me from leaving.', ko:'그는 내가 떠나지 못하게 했어요.' },
    ]
  },
  find: {
    meaning: '발견하다, 알게 되다',
    patterns: [

    // 목록 닫기
    document.getElementById('verbListPanel').classList.remove('show');
    document.getElementById('toggleArrow').classList.remove('open');
  };
  verbGrid.appendChild(chip);
});

function toggleList() {
  const panel = document.getElementById('verbListPanel');
  const arrow = document.getElementById('toggleArrow');
  panel.classList.toggle('show');
  arrow.classList.toggle('open');
}

function onSearchInput(val) {
  if (val.trim() === '') {
    document.getElementById('resultCard').classList.remove('show');
    document.getElementById('resultEmpty').style.display = '';
  }
}

function doSearch() {
  const val = document.getElementById('searchInput').value.trim().toLowerCase();
  if (!val) return;
  renderVerb(val);
}

function renderVerb(verb) {
  const d = verbs[verb];
  const empty = document.getElementById('resultEmpty');
  const card = document.getElementById('resultCard');

  if (!d) {
    empty.style.display = '';
    empty.innerHTML = `<span class="empty-icon">🔍</span><p><strong style="color:var(--coral);font-family:'DM Mono',monospace">${verb}</strong> 은(는) 아직 없어요.<br>다른 동사를 검색해보세요!</p>`;
    card.classList.remove('show');
    return;
  }

  empty.style.display = 'none';

  const patternsHTML = d.patterns.map(p => `
    <div class="pattern-card">
      <div class="pattern-top">
        <span class="form-badge">${p.form}</span>
        <span class="pattern-structure">${p.structure}</span>
      </div>
      <div class="pattern-meaning">${p.meaning}</div>
      <div class="pattern-example">${p.example}</div>
      <div class="pattern-example-ko">${p.ko}</div>
    </div>
  `).join('');

  card.innerHTML = `
    <div class="verb-title-row">
      <span class="verb-main">${verb}</span>
      <span class="verb-meaning-main">${d.meaning}</span>
    </div>
    <div class="pattern-list">${patternsHTML}</div>
  `;

  card.classList.remove('show');
  void card.offsetWidth;
  card.classList.add('show');
}

// Enter 키
document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});
</script>
</body>
</html>
